---
name: Release
on:
  push:
    tags:
      - "*"

defaults:
  run:
    working-directory: "lean_delivery.solr-standalone"

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          path: "lean_delivery.solr-standalone"

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Ansible
        run: pip3 install ansible-core

      - name: Import role to Galaxy
        run: >-
          ansible-galaxy role import --api-key ${{ secrets.GALAXY_API_TOKEN }}
          $(echo ${{ github.repository }} | cut -d/ -f1) $(echo ${{ github.repository }} | cut -d/ -f2)
